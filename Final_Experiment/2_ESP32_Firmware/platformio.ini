[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; LDF가 불필요한 깊이까지 탐색하지 않도록 제한
lib_ldf_mode = chain

; 다른 보드용 통신 라이브러리 강제 컴파일 차단 (컴파일 에러 해결)
lib_ignore =
  WiFi101
  WiFi101_Generic
  WiFiEspAT
  STM32Ethernet
  Ethernet
  EthernetENC
  WiFiNINA_Generic
  ESP8266_AT_WebServer
  UIPEthernet

; ESP32 단독 구동 및 DB 직접 연동을 위한 라이브러리
lib_deps =
  khoih-prog/MySQL_MariaDB_Generic @ ^1.7.2
  bblanchon/ArduinoJson @ ^7.4.3
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit SSD1306 @ ^2.5.9