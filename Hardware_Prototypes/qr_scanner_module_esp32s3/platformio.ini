[env:esp32-s3-devkitc-1]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ESP32-S3 N16R8 Flash & PSRAM 설정
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

; 빌드 플래그 (PSRAM 활성화 및 USB CDC 활성화)
build_flags = 
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

; LDF가 불필요한 깊이까지 탐색하지 않도록 제한
lib_ldf_mode = chain

; 다른 보드용 통신 라이브러리 강제 컴파일 차단 (컴파일 에러 해결)
lib_ignore =
  WiFi101
  WiFi101_Generic
  WiFiEspAT
  STM32Ethernet
  Ethernet
  EthernetENC
  WiFiNINA_Generic
  ESP8266_AT_WebServer
  UIPEthernet

; ESP32 단독 구동 및 DB 직접 연동을 위한 라이브러리
lib_deps =
  khoih-prog/MySQL_MariaDB_Generic @ ^1.7.2
  bblanchon/ArduinoJson @ ^7.4.3
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit SSD1306 @ ^2.5.9